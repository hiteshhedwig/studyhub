name: Release

# Build native installers on each OS runner and attach them to a GitHub Release.
# Trigger by pushing a tag like `v0.1.0`, or run manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux -> .AppImage + .deb
          # Build inside an Ubuntu 20.04 container so the resulting binary links
          # against glibc 2.31, keeping it runnable on 20.04+ hosts. (AppImage
          # bundles webkit/gtk but NOT glibc itself.)
          - platform: ubuntu-22.04
            container: ubuntu:20.04
          # Windows -> .msi (WiX) + .exe (NSIS)
          - platform: windows-latest
            container: ""

    runs-on: ${{ matrix.platform }}
    container: ${{ matrix.container || null }}
    steps:
      - name: Install base tools (Linux container)
        if: matrix.container == 'ubuntu:20.04'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl wget file git build-essential \
            pkg-config libssl-dev sudo xz-utils
          # Newer git PPA so actions/checkout works cleanly
          apt-get install -y --no-install-recommends software-properties-common
          add-apt-repository -y ppa:git-core/ppa
          apt-get update
          apt-get install -y --no-install-recommends git

      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies (Tauri 1 / WebKitGTK 4.0)
        if: matrix.container == 'ubuntu:20.04'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev \
            libx11-dev \
            libxi-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app + bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Study Hub ${{ github.ref_name }}"
          releaseBody: "Download the AppImage (Linux) or the .exe / .msi (Windows) below."
          releaseDraft: true
          prerelease: false
